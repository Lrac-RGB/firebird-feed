<script src="data.js"></script>
<script>
const MON_LONG=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW_LONG=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

const now=new Date();
const dow=now.getDay();

document.getElementById("today-heading").textContent=DOW_LONG[dow]+" · "+MON_LONG[now.getMonth()]+" "+now.getDate();
document.getElementById("today-lede").textContent="Everything happening in Phoenixville on "+DOW_LONG[dow]+", "+MON_LONG[now.getMonth()]+" "+now.getDate()+", "+now.getFullYear()+" — dated events, happy hours, and recurring nights.";

function srcStamp(src){
  const s=SOURCES[src];
  return `<span class="src"><span class="dot" style="background:${s.color}"></span>${s.label}</span>`;
}

/* Filter today's recurring entries */
const todayRec=RECURRING.filter(r=>dayTest(r.cadence,dow));

/* Render recurring */
const recWrap=document.getElementById("today-recurring");
if(todayRec.length){
  recWrap.innerHTML=todayRec.map(r=>
    `<div class="rec-card" style="--accent:${SOURCES[r.src].color}">
       <div class="cadence">${r.cadence}</div>
       <h3>${r.title}</h3>
       <p>${r.text}</p>
       <div class="card-foot">${srcStamp(r.src)}<a class="out" href="${r.url||SOURCES[r.src].url}" target="_blank" rel="noopener">Details ↗</a></div>
     </div>`
  ).join("");
} else {
  document.getElementById("rec-label").style.display="none";
  recWrap.innerHTML=`<div class="empty">No regular nights scheduled for today.</div>`;
}

/* Nav hamburger */
document.querySelector('.nav-toggle')?.addEventListener('click',function(){
  const links=document.querySelector('.nav-links');
  const open=links.classList.toggle('open');
  this.setAttribute('aria-expanded',open);
});
document.querySelector('.nav-links')?.addEventListener('click',e=>{
  if(e.target.tagName==='A'){
    document.querySelector('.nav-links').classList.remove('open');
    document.querySelector('.nav-toggle')?.setAttribute('aria-expanded','false');
  }
});
</script>
