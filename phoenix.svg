<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" role="img" aria-label="Phoenix">
  <defs>
    <linearGradient id="f" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#ffe082"/>
      <stop offset="30%"  stop-color="#ffc24a"/>
      <stop offset="65%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff4d1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="52%">
      <stop offset="0%"   stop-color="#ffc24a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff4d1c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="50" cy="48" rx="50" ry="50" fill="url(#glow)"/>

  <!-- LEFT WING: sweeps up-left from body -->
  <path d="M41 43 C32 36 17 25 4 22
           C2 21 1 23 3 26
           C10 31 22 35 32 41
           C37 45 39 50 41 54Z"
        fill="url(#f)"/>

  <!-- RIGHT WING: mirror -->
  <path d="M59 43 C68 36 83 25 96 22
           C98 21 99 23 97 26
           C90 31 78 35 68 41
           C63 45 61 50 59 54Z"
        fill="url(#f)"/>

  <!-- BODY: teardrop from neck to base -->
  <path d="M50 20
           C46 28 43 39 44 51
           C45 59 47 65 50 69
           C53 65 55 59 56 51
           C57 39 54 28 50 20Z"
        fill="url(#f)"/>

  <!-- HEAD: rounded, brighter gold -->
  <ellipse cx="50" cy="22" rx="8" ry="7" fill="#ffd166"/>

  <!-- CREST: 3 flame feathers rising from head -->
  <path d="M50 18 C49 11 47  7 49  4 C51  7 51 12 50 18Z" fill="#ffe082"/>
  <path d="M50 18 C46 10 42  7 44  3 C47  8 49 13 50 18Z" fill="#ffc24a"/>
  <path d="M50 18 C54 10 58  7 56  3 C53  8 51 13 50 18Z" fill="#ffc24a"/>

  <!-- TAIL: 5 flame feathers -->
  <path d="M50 69 C50 77 50 86 50 94 C50 86 50 77 50 69Z"          fill="#ff8a3d"/>
  <path d="M48 71 C45 79 44 88 46 96 C49 88 50 79 50 74Z"          fill="#ff6a2c"/>
  <path d="M52 71 C55 79 56 88 54 96 C51 88 50 79 50 74Z"          fill="#ff6a2c"/>
  <path d="M44 74 C40 82 38 92 41 100 C45 92 48 83 50 77Z"         fill="#ff5020"/>
  <path d="M56 74 C60 82 62 92 59 100 C55 92 52 83 50 77Z"         fill="#ff5020"/>
</svg>
