<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 106" role="img" aria-label="Phoenix">
  <defs>
    <radialGradient id="hd" cx="50%" cy="42%" r="56%">
      <stop offset="0%"   stop-color="#ff8c00"/>
      <stop offset="52%"  stop-color="#d63200"/>
      <stop offset="100%" stop-color="#7a1800"/>
    </radialGradient>
    <radialGradient id="ey" cx="36%" cy="30%" r="62%">
      <stop offset="0%"   stop-color="#ffee44"/>
      <stop offset="55%"  stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#cc8800"/>
    </radialGradient>
  </defs>

  <!-- CREST — 5 swept flame plumes, tallest in center -->
  <path d="M 50 29 C 47 17 46  9 49  3 C 53  9 54 17 53 29 Z" fill="#ffee88" stroke="#bb5500" stroke-width=".9"/>
  <path d="M 41 32 C 37 20 37 12 41  6 C 44 12 44 20 44 32 Z" fill="#ffe066" stroke="#bb5500" stroke-width=".9"/>
  <path d="M 59 32 C 63 20 63 12 59  6 C 56 12 56 20 56 32 Z" fill="#ffe066" stroke="#bb5500" stroke-width=".9"/>
  <path d="M 32 37 C 27 25 28 17 32 11 C 35 17 35 25 36 37 Z" fill="#ffcc44" stroke="#bb5500" stroke-width=".9"/>
  <path d="M 68 37 C 73 25 72 17 68 11 C 65 17 65 25 64 37 Z" fill="#ffcc44" stroke="#bb5500" stroke-width=".9"/>

  <!-- HEAD -->
  <ellipse cx="50" cy="65" rx="38" ry="36" fill="url(#hd)" stroke="#6b1800" stroke-width="1.6"/>

  <!-- Dark brow ridges above each eye (fierce, bird-of-prey look) -->
  <path d="M 18 51 C 22 45 30 43 44 48" stroke="#5a0a00" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M 82 51 C 78 45 70 43 56 48" stroke="#5a0a00" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- Eye socket shadow -->
  <ellipse cx="33" cy="58" rx="11" ry="10" fill="#7a1800" opacity="0.4"/>
  <ellipse cx="67" cy="58" rx="11" ry="10" fill="#7a1800" opacity="0.4"/>

  <!-- EYES -->
  <circle cx="33" cy="58" r="9.5" fill="url(#ey)" stroke="#6b1800" stroke-width="1.4"/>
  <circle cx="33" cy="58" r="4.8" fill="#1a0800"/>
  <circle cx="34" cy="56" r="1.8" fill="white" opacity="0.85"/>

  <circle cx="67" cy="58" r="9.5" fill="url(#ey)" stroke="#6b1800" stroke-width="1.4"/>
  <circle cx="67" cy="58" r="4.8" fill="#1a0800"/>
  <circle cx="68" cy="56" r="1.8" fill="white" opacity="0.85"/>

  <!-- Lower eyelid crease (squinting, fierce) -->
  <path d="M 23 64 C 28 68 38 68 43 64" stroke="#5a0a00" stroke-width="1.4" fill="none"/>
  <path d="M 77 64 C 72 68 62 68 57 64" stroke="#5a0a00" stroke-width="1.4" fill="none"/>

  <!-- Face feather texture (subtle arcs on cheeks) -->
  <path d="M 16 66 C 22 60 30 58 42 60" stroke="#8c1c00" stroke-width=".9" fill="none"/>
  <path d="M 14 75 C 20 69 29 67 41 69" stroke="#8c1c00" stroke-width=".9" fill="none"/>
  <path d="M 84 66 C 78 60 70 58 58 60" stroke="#8c1c00" stroke-width=".9" fill="none"/>
  <path d="M 86 75 C 80 69 71 67 59 69" stroke="#8c1c00" stroke-width=".9" fill="none"/>

  <!-- BEAK (hooked, centered, pointing down) -->
  <!-- Upper mandible -->
  <path d="M 43 71 C 43 74 46 80 50 86 C 54 80 57 74 57 71 C 54 69 50 68 46 69 Z"
        fill="#cc5500" stroke="#6b1800" stroke-width="1.3"/>
  <!-- Tip hook -->
  <path d="M 48 84 C 48 88 50 91 52 88 C 51 86 50 84 50 84 Z"
        fill="#aa3a00" stroke="#6b1800" stroke-width="1"/>
  <!-- Lower mandible / chin -->
  <path d="M 45 77 C 46 81 50 84 54 81 C 53 78 50 76 47 77 Z"
        fill="#bb4800" stroke="#6b1800" stroke-width="1"/>
  <!-- Beak gap -->
  <path d="M 44 77 C 47 75 53 75 56 77" stroke="#3a0c00" stroke-width=".9" fill="none"/>

  <!-- Chin / neck ruff -->
  <path d="M 20 92 C 30 86 40 84 50 84 C 60 84 70 86 80 92" stroke="#8c1c00" stroke-width="1.2" fill="none"/>
  <path d="M 14 100 C 26 93 38 90 50 90 C 62 90 74 93 86 100" stroke="#7a1800" stroke-width="1" fill="none" opacity="0.65"/>
</svg>
