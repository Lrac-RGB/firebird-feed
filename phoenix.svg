<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" role="img" aria-label="Phoenix">
  <defs>
    <radialGradient id="bg" cx="45%" cy="38%" r="56%">
      <stop offset="0%"   stop-color="#ff8c00"/>
      <stop offset="55%"  stop-color="#d63200"/>
      <stop offset="100%" stop-color="#8c1c00"/>
    </radialGradient>
    <radialGradient id="wg" cx="75%" cy="25%" r="65%">
      <stop offset="0%"   stop-color="#ffcc00"/>
      <stop offset="45%"  stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#cc3300"/>
    </radialGradient>
    <radialGradient id="hg" cx="40%" cy="35%" r="58%">
      <stop offset="0%"   stop-color="#ffcc44"/>
      <stop offset="60%"  stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
  </defs>

  <!-- === WING (behind body) === -->
  <path d="M52 56
           C 60 44, 74 30, 82 22
           C 86 19, 88 22, 86 27
           C 80 36, 68 48, 58 62
           C 56 66, 53 70, 52 73
           Z"
        fill="url(#wg)" stroke="#6b1800" stroke-width="1.2"/>

  <!-- Wing primary feathers — 4 fingers at leading tip -->
  <path d="M82 22 C85 16 89 11 91 13 C89 18 85 24 83 27Z" fill="#ffcc00" stroke="#7a2200" stroke-width=".8"/>
  <path d="M76 17 C79 11 83  7 85  9 C83 14 79 20 77 23Z" fill="#ffd944" stroke="#7a2200" stroke-width=".8"/>
  <path d="M70 13 C73  7 77  4 79  6 C77 11 73 17 71 20Z" fill="#ffdd66" stroke="#7a2200" stroke-width=".8"/>
  <path d="M64 10 C67  4 71  1 73  4 C71  9 67 14 65 18Z" fill="#ffe080" stroke="#7a2200" stroke-width=".8"/>

  <!-- Wing feather detail lines -->
  <path d="M58 62 C66 52 74 40 80 30" stroke="#aa3300" stroke-width=".7" fill="none"/>
  <path d="M56 66 C64 55 72 44 78 34" stroke="#aa3300" stroke-width=".7" fill="none"/>

  <!-- === BODY === -->
  <ellipse cx="40" cy="72" rx="21" ry="24" fill="url(#bg)" stroke="#6b1800" stroke-width="1.5"/>

  <!-- Body feather scale arcs -->
  <path d="M22 62 C29 56 38 55 52 60" stroke="#8c1c00" stroke-width=".9" fill="none"/>
  <path d="M20 69 C27 63 38 62 54 66" stroke="#8c1c00" stroke-width=".9" fill="none"/>
  <path d="M20 76 C27 70 38 69 55 73" stroke="#8c1c00" stroke-width=".9" fill="none"/>
  <path d="M21 83 C28 77 40 76 56 80" stroke="#8c1c00" stroke-width=".9" fill="none"/>
  <path d="M24 89 C31 83 42 82 57 85" stroke="#8c1c00" stroke-width=".9" fill="none"/>

  <!-- === NECK === -->
  <path d="M48 50 C54 42 60 34 64 28
           C60 26 54 30 50 38 C47 42 47 47 48 50Z"
        fill="url(#hg)" stroke="#6b1800" stroke-width="1"/>

  <!-- === HEAD === -->
  <ellipse cx="64" cy="28" rx="13" ry="11" fill="url(#hg)" stroke="#6b1800" stroke-width="1.5"/>

  <!-- === CREST: 3 swept-back flame feathers === -->
  <path d="M58 18 C54 10 51  5 53  2 C57  6 59 12 60 19Z" fill="#ffe066" stroke="#cc6600" stroke-width=".8"/>
  <path d="M63 16 C61  8 59  3 62  1 C65  5 66 11 66 17Z" fill="#ffee88" stroke="#cc6600" stroke-width=".8"/>
  <path d="M68 17 C68  9 67  4 70  3 C72  7 72 13 71 18Z" fill="#ffe066" stroke="#cc6600" stroke-width=".8"/>

  <!-- === EYE: golden, mural-style === -->
  <circle cx="60" cy="25" r="5"   fill="#ffcc00" stroke="#6b1800" stroke-width="1.2"/>
  <circle cx="60" cy="25" r="2.5" fill="#1a0800"/>
  <circle cx="61" cy="24" r=".9"  fill="white" opacity="0.75"/>

  <!-- === BEAK: hooked open beak pointing up-right === -->
  <!-- Upper mandible: sweeps up-right, curves at tip -->
  <path d="M73 23
           C 79 18, 86 13, 91 15
           C 90 19, 85 23, 79 25
           C 76 26, 73 25, 73 23Z"
        fill="#cc5500" stroke="#6b1800" stroke-width="1"/>
  <!-- Lower mandible: slightly open -->
  <path d="M73 26
           C 78 26, 84 27, 87 31
           C 83 32, 77 30, 73 28
           C 72 27, 72 26, 73 26Z"
        fill="#cc5500" stroke="#6b1800" stroke-width="1"/>
  <!-- Gap line between mandibles -->
  <path d="M73 25 C78 24 84 24 90 16" stroke="#8b3200" stroke-width=".7" fill="none"/>

  <!-- === TAIL FEATHERS: 6 trailing left-downward === -->
  <path d="M34 88 C24 96 18 106 22 114 C27 105 32 96 38 91Z"  fill="#cc2800" stroke="#6b1800" stroke-width=".8"/>
  <path d="M29 90 C18 99 12 110 16 115 C22 107 28 97 34 93Z"  fill="#bb2200" stroke="#6b1800" stroke-width=".8"/>
  <path d="M39 86 C30 94 26 104 30 113 C35 104 39 94 44 89Z"  fill="#dd3300" stroke="#6b1800" stroke-width=".8"/>
  <path d="M44 87 C36 95 33 105 38 113 C43 105 46 95 49 90Z"  fill="#cc3300" stroke="#6b1800" stroke-width=".8"/>
  <path d="M49 88 C43 96 41 106 46 113 C50 105 52 96 53 90Z"  fill="#dd4400" stroke="#6b1800" stroke-width=".8"/>
  <path d="M54 88 C50 96 49 106 54 112 C57 105 58 96 57 90Z"  fill="#ee5500" stroke="#6b1800" stroke-width=".8"/>
</svg>
