<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" role="img" aria-label="Phoenixville Pennsylvania">
  <defs>
    <linearGradient id="flame" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#ffe082"/>
      <stop offset="30%"  stop-color="#ffc24a"/>
      <stop offset="65%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff4d1c"/>
    </linearGradient>
    <linearGradient id="heat" gradientUnits="userSpaceOnUse" x1="138" y1="30" x2="515" y2="110">
      <stop offset="0%"   stop-color="#ff4d1c"/>
      <stop offset="45%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffc24a"/>
    </linearGradient>
  </defs>

  <!-- Phoenix icon: 100×110 source scaled to fit 120px tall, shifted right 4px -->
  <g transform="translate(4, 3) scale(1.15)">
    <!-- Left wing -->
    <path d="M41 43 C32 36 17 25 4 22 C2 21 1 23 3 26 C10 31 22 35 32 41 C37 45 39 50 41 54Z" fill="url(#flame)"/>
    <!-- Right wing -->
    <path d="M59 43 C68 36 83 25 96 22 C98 21 99 23 97 26 C90 31 78 35 68 41 C63 45 61 50 59 54Z" fill="url(#flame)"/>
    <!-- Body -->
    <path d="M50 20 C46 28 43 39 44 51 C45 59 47 65 50 69 C53 65 55 59 56 51 C57 39 54 28 50 20Z" fill="url(#flame)"/>
    <!-- Head -->
    <ellipse cx="50" cy="22" rx="8" ry="7" fill="#ffd166"/>
    <!-- Crest -->
    <path d="M50 18 C49 11 47 7 49 4 C51 7 51 12 50 18Z" fill="#ffe082"/>
    <path d="M50 18 C46 10 42 7 44 3 C47 8 49 13 50 18Z" fill="#ffc24a"/>
    <path d="M50 18 C54 10 58 7 56 3 C53 8 51 13 50 18Z" fill="#ffc24a"/>
    <!-- Tail -->
    <path d="M50 69 C50 77 50 86 50 93 C50 86 50 77 50 69Z" fill="#ff8a3d"/>
    <path d="M48 71 C45 79 44 88 46 95 C49 88 50 79 50 74Z" fill="#ff6a2c"/>
    <path d="M52 71 C55 79 56 88 54 95 C51 88 50 79 50 74Z" fill="#ff6a2c"/>
    <path d="M44 74 C40 82 38 91 41 99 C45 91 48 83 50 77Z" fill="#ff5020"/>
    <path d="M56 74 C60 82 62 91 59 99 C55 91 52 83 50 77Z" fill="#ff5020"/>
  </g>

  <!-- Divider rule -->
  <rect x="126" y="14" width="1.5" height="102" rx="1" fill="#ff8a3d" opacity="0.35"/>

  <!-- PHOENIXVILLE wordmark -->
  <text x="142" y="80"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="54"
    font-weight="900"
    letter-spacing="3"
    fill="url(#heat)">PHOENIXVILLE</text>

  <!-- PENNSYLVANIA sub-label -->
  <text x="144" y="106"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13"
    letter-spacing="8"
    fill="#bdb6ab">PENNSYLVANIA</text>
</svg>
