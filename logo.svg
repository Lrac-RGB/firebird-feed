<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 130" role="img" aria-label="Phoenixville Pennsylvania">
  <defs>
    <linearGradient id="lw" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#7a1800"/>
      <stop offset="38%"  stop-color="#d63200"/>
      <stop offset="70%"  stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="rw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7a1800"/>
      <stop offset="38%"  stop-color="#d63200"/>
      <stop offset="70%"  stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#ffee00"/>
    </linearGradient>
    <linearGradient id="heat" gradientUnits="userSpaceOnUse" x1="148" y1="30" x2="528" y2="110">
      <stop offset="0%"   stop-color="#cc3200"/>
      <stop offset="45%"  stop-color="#d63200"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- Wings: source 160×88, scaled to 126×69, centered vertically in 130px → translate(2, 30) scale(0.790) -->
  <g transform="translate(2, 30) scale(0.790)">

    <!-- LEFT WING -->
    <path d="M 78 76
             C 60 62 38 44 14 18
             C 10 14 8 18 10 22
             C 32 46 58 64 76 82
             Z"
          fill="url(#lw)" stroke="#5a1200" stroke-width="1.3"/>
    <path d="M 76 82 C 54 68 32 50 12 28" stroke="#aa3300" stroke-width=".9" fill="none" opacity="0.7"/>

    <!-- Left flame feathers -->
    <path d="M 14 18 C 10  8  9  2 12 -2 C 15  4 14 12 15 20 Z" fill="#ffcc00" stroke="#aa4400" stroke-width=".8"/>
    <path d="M 21 13 C 18  3 18 -2 21 -4 C 23  2 22 10 22 15 Z" fill="#ffd900" stroke="#aa4400" stroke-width=".8"/>
    <path d="M 28 10 C 26  0 27 -4 30 -5 C 32  1 31  8 30 12 Z" fill="#ffdd55" stroke="#aa4400" stroke-width=".8"/>
    <path d="M 35  8 C 34  0 35 -4 38 -4 C 39  2 38  8 37 10 Z" fill="#ffe577" stroke="#aa4400" stroke-width=".8"/>

    <!-- Left wisps -->
    <path d="M 40 50 C 39 44 38 39 40 36 C 42 40 41 45 42 51 Z" fill="url(#flame)" opacity="0.8"/>
    <path d="M 54 60 C 53 53 52 47 54 44 C 56 48 55 54 56 61 Z" fill="url(#flame)" opacity="0.7"/>
    <path d="M 66 68 C 65 62 65 56 67 53 C 68 57 68 63 68 69 Z" fill="url(#flame)" opacity="0.6"/>

    <!-- RIGHT WING -->
    <path d="M 82 76
             C 100 62 122 44 146 18
             C 150 14 152 18 150 22
             C 128 46 102 64 84 82
             Z"
          fill="url(#rw)" stroke="#5a1200" stroke-width="1.3"/>
    <path d="M 84 82 C 106 68 128 50 148 28" stroke="#aa3300" stroke-width=".9" fill="none" opacity="0.7"/>

    <!-- Right flame feathers -->
    <path d="M 146 18 C 150  8 151  2 148 -2 C 145  4 146 12 145 20 Z" fill="#ffcc00" stroke="#aa4400" stroke-width=".8"/>
    <path d="M 139 13 C 142  3 142 -2 139 -4 C 137  2 138 10 138 15 Z" fill="#ffd900" stroke="#aa4400" stroke-width=".8"/>
    <path d="M 132 10 C 134  0 133 -4 130 -5 C 128  1 129  8 130 12 Z" fill="#ffdd55" stroke="#aa4400" stroke-width=".8"/>
    <path d="M 125  8 C 126  0 125 -4 122 -4 C 121  2 122  8 123 10 Z" fill="#ffe577" stroke="#aa4400" stroke-width=".8"/>

    <!-- Right wisps -->
    <path d="M 120 50 C 121 44 122 39 120 36 C 118 40 119 45 118 51 Z" fill="url(#flame)" opacity="0.8"/>
    <path d="M 106 60 C 107 53 108 47 106 44 C 104 48 105 54 104 61 Z" fill="url(#flame)" opacity="0.7"/>
    <path d="M  94 68 C  95 62  95 56  93 53 C  92 57  92 63  92 69 Z" fill="url(#flame)" opacity="0.6"/>

    <!-- Central flame -->
    <path d="M 80 72 C 77 62 77 54 80 48 C 83 54 83 62 80 72 Z" fill="#ff8800" stroke="#5a1200" stroke-width=".9"/>
    <path d="M 80 68 C 78 58 79 52 80 46 C 81 52 82 58 80 68 Z" fill="#ffcc00" opacity="0.6"/>
  </g>

  <!-- Divider -->
  <rect x="132" y="12" width="1.5" height="106" rx="1" fill="#cc5500" opacity="0.5"/>

  <!-- PHOENIXVILLE -->
  <text x="146" y="79"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="52" font-weight="900" letter-spacing="2"
    fill="url(#heat)">PHOENIXVILLE</text>

  <!-- EVENTS -->
  <text x="148" y="105"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13" letter-spacing="10"
    fill="#bdb6ab">EVENTS</text>
</svg>
