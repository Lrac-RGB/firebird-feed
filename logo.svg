    <path d="M 73 108 C 67 122 65 136 69 146 C 72 136 74 124 75 112 Z"  fill="#dd3300" stroke="#6b1800" stroke-width=".9"/>
    <path d="M 78 109 C 77 124 77 138 80 148 C 83 138 83 124 82 109 Z"  fill="#ee4400" stroke="#6b1800" stroke-width=".9"/>
    <path d="M 87 108 C 93 122 95 136 91 146 C 88 136 86 124 85 112 Z"  fill="#dd3300" stroke="#6b1800" stroke-width=".9"/>
    <path d="M 92 106 C 102 118 106 130 102 142 C 98 130 94 120 90 110 Z" fill="#cc2800" stroke="#6b1800" stroke-width=".9"/>

    <!-- LEFT WING -->
    <path d="M 74 80 C 54 62 28 40 8 20 C 5 17 3 21 5 26 C 26 46 54 66 72 88 Z"
          fill="url(#wgL)" stroke="#6b1800" stroke-width="1.4"/>
    <path d="M 72 88 C 52 70 28 50 8 30" stroke="#aa3300" stroke-width=".8" fill="none"/>
    <path d="M 73 84 C 54 66 32 46 14 28" stroke="#cc4400" stroke-width=".6" fill="none" opacity="0.6"/>
    <path d="M 8 20 C 4 12 3 6 6 2 C 9 8 9 14 10 22 Z"    fill="#ffcc00" stroke="#7a2200" stroke-width=".9"/>
    <path d="M 15 15 C 12 7 12 1 15 -1 C 18 5 17 11 17 18 Z" fill="#ffd944" stroke="#7a2200" stroke-width=".9"/>
    <path d="M 22 11 C 21 3 22 -2 25 -2 C 27 4 25 10 24 15 Z" fill="#ffdd66" stroke="#7a2200" stroke-width=".9"/>
    <path d="M 29 9  C 30 2 31 -2 34 -1 C 35 5 33 11 31 15 Z" fill="#ffe080" stroke="#7a2200" stroke-width=".9"/>

    <!-- RIGHT WING -->
    <path d="M 86 80 C 106 62 132 40 152 20 C 155 17 157 21 155 26 C 134 46 106 66 88 88 Z"
          fill="url(#wgR)" stroke="#6b1800" stroke-width="1.4"/>
    <path d="M 88 88 C 108 70 132 50 152 30" stroke="#aa3300" stroke-width=".8" fill="none"/>
    <path d="M 87 84 C 106 66 128 46 146 28" stroke="#cc4400" stroke-width=".6" fill="none" opacity="0.6"/>
    <path d="M 152 20 C 156 12 157 6 154 2 C 151 8 151 14 150 22 Z" fill="#ffcc00" stroke="#7a2200" stroke-width=".9"/>
    <path d="M 145 15 C 148 7 148 1 145 -1 C 142 5 143 11 143 18 Z" fill="#ffd944" stroke="#7a2200" stroke-width=".9"/>
    <path d="M 138 11 C 139 3 138 -2 135 -2 C 133 4 135 10 136 15 Z" fill="#ffdd66" stroke="#7a2200" stroke-width=".9"/>
    <path d="M 131 9  C 130 2 129 -2 126 -1 C 125 5 127 11 129 15 Z" fill="#ffe080" stroke="#7a2200" stroke-width=".9"/>

