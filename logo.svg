<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 130" role="img" aria-label="Phoenixville Events">
  <defs>
    <linearGradient id="fo" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#7a0f00"/>
      <stop offset="28%"  stop-color="#cc2200"/>
      <stop offset="58%"  stop-color="#ff6600"/>
      <stop offset="82%"  stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="fi" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#ff3300"/>
      <stop offset="48%"  stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffee88"/>
    </linearGradient>
    <linearGradient id="fc" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%"   stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#fff8cc"/>
    </linearGradient>
    <linearGradient id="heat" gradientUnits="userSpaceOnUse" x1="118" y1="30" x2="528" y2="110">
      <stop offset="0%"   stop-color="#cc3200"/>
      <stop offset="45%"  stop-color="#d63200"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- Fire icon: source 80×100, scale=1.3 → 104×130px -->
  <g transform="scale(1.3)">
    <!-- LEFT outer flame -->
    <path d="M 20 98 C 10 96  4 82  8 64 C 11 52 15 42 18 30 C 22 42 24 54 24 66 C 24 84 18 96 20 98 Z" fill="url(#fo)"/>
    <!-- RIGHT outer flame -->
    <path d="M 60 98 C 70 96 76 82 72 64 C 69 52 65 42 62 30 C 58 42 56 54 56 66 C 56 84 62 96 60 98 Z" fill="url(#fo)"/>
    <!-- CENTER outer flame -->
    <path d="M 40 98 C 22 98 10 80 16 56 C 20 42 28 26 40  8 C 52 26 60 42 64 56 C 70 80 58 98 40 98 Z" fill="url(#fo)"/>
    <!-- LEFT inner flame -->
    <path d="M 20 98 C 14 96 10 84 13 68 C 15 58 17 50 19 38 C 21 50 22 58 22 70 C 22 86 22 96 20 98 Z" fill="url(#fi)"/>
    <!-- RIGHT inner flame -->
    <path d="M 60 98 C 66 96 70 84 67 68 C 65 58 63 50 61 38 C 59 50 58 58 58 70 C 58 86 58 96 60 98 Z" fill="url(#fi)"/>
    <!-- CENTER inner flame -->
    <path d="M 40 98 C 28 96 22 78 26 60 C 29 48 33 36 40 22 C 47 36 51 48 54 60 C 58 78 52 96 40 98 Z" fill="url(#fi)"/>
    <!-- CENTER core -->
    <path d="M 40 96 C 34 90 30 74 32 60 C 34 50 37 42 40 32 C 43 42 46 50 48 60 C 50 74 46 90 40 96 Z" fill="url(#fc)" opacity="0.85"/>
  </g>

  <!-- Divider -->
  <rect x="114" y="12" width="1.5" height="106" rx="1" fill="#cc5500" opacity="0.5"/>

  <!-- PHOENIXVILLE -->
  <text x="128" y="79"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="52" font-weight="900" letter-spacing="2"
    fill="url(#heat)">PHOENIXVILLE</text>

  <!-- EVENTS -->
  <text x="130" y="105"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13" letter-spacing="10"
    fill="#bdb6ab">EVENTS</text>
</svg>
