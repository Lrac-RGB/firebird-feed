    <path d="M10 17 C6 13 4 18 5 21 C7 20 9 18 11 19Z" fill="#ffe082"/>
    <path d="M16 12 C13 8 10 12 12 15 C13 14 15 12 17 13Z" fill="#ffe082"/>
    <!-- RIGHT WING -->
    <path d="M60 45 C70 36 84 26 94 22 C97 21 98 23 96 26 C88 31 76 39 66 48 C64 51 62 55 61 59Z" fill="url(#flame)"/>
    <!-- RIGHT primaries -->
    <path d="M94 22 C98 19 100 24 99 27 C97 25 95 23 93 24Z" fill="#ffd166"/>
    <path d="M90 17 C94 13 96 18 95 21 C93 20 91 18 89 19Z" fill="#ffe082"/>
    <path d="M84 12 C87 8 90 12 88 15 C87 14 85 12 83 13Z" fill="#ffe082"/>
    <!-- TAIL -->
    <path d="M50 67 C50 76 50 87 50 96 C50 87 50 76 50 67Z"    fill="#ff8a3d"/>
    <path d="M45 68 C41 77 40 88 43 97 C46 88 48 77 50 72Z"    fill="#ff6a2c"/>
    <path d="M55 68 C59 77 60 88 57 97 C54 88 52 77 50 72Z"    fill="#ff6a2c"/>
    <path d="M39 70 C33 80 31 92 35 102 C40 92 44 81 48 75Z"   fill="#ff5020"/>
    <path d="M61 70 C67 80 69 92 65 102 C60 92 56 81 52 75Z"   fill="#ff5020"/>
