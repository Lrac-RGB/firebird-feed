<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" role="img" aria-label="Phoenixville Pennsylvania">
  <defs>
    <linearGradient id="flame" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ff4d1c"/>
      <stop offset="45%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffc24a"/>
    </linearGradient>
    <linearGradient id="heat" gradientUnits="userSpaceOnUse" x1="136" y1="30" x2="510" y2="110">
      <stop offset="0%"   stop-color="#ff4d1c"/>
      <stop offset="45%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffc24a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Phoenix mark — 3.25× scale of the 32×32 site icon -->
  <g transform="translate(8, 5) scale(3.25)" filter="url(#glow)">
    <path d="M16 3c2 4 1 6-1 8 3-1 5 0 6 3 1-3 3-3 5-2-2 5-6 7-6 7 4 0 6 3 6 3-3 1-5 0-7-1 1 3 0 6-3 8-3-2-4-5-3-8-2 1-4 2-7 1 0 0 2-3 6-3 0 0-4-2-6-7 2-1 4-1 5 2 1-3 3-4 6-3-2-2-3-4-1-8z" fill="url(#flame)"/>
  </g>

  <!-- Divider rule -->
  <rect x="120" y="16" width="1.5" height="98" rx="1" fill="#ff8a3d" opacity="0.35"/>

  <!-- PHOENIXVILLE wordmark -->
  <text x="138" y="80"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="54"
    font-weight="900"
    letter-spacing="3"
    fill="url(#heat)">PHOENIXVILLE</text>

  <!-- PENNSYLVANIA sub-label -->
  <text x="140" y="105"
    font-family="'Trebuchet MS', 'Arial', sans-serif"
    font-size="13"
    letter-spacing="8"
    fill="#bdb6ab">PENNSYLVANIA</text>
</svg>
