    <path d="M 75 70 C 76 65 78 62 80 60 C 82 62 84 65 85 70 C 82 68 80 67 78 68 Z"
          fill="url(#hg)" stroke="#6b1800" stroke-width="1"/>

    <!-- HEAD -->
    <ellipse cx="80" cy="55" rx="15" ry="13" fill="url(#hg)" stroke="#6b1800" stroke-width="1.7"/>

    <!-- CREST -->
    <path d="M 73 44 C 69 34 68 27 71 23 C 74 28 76 36 76 46 Z" fill="#ffe066" stroke="#cc6600" stroke-width=".9"/>
    <path d="M 80 42 C 80 31 79 24 82 21 C 84 24 83 31 82 43 Z" fill="#ffee88" stroke="#cc6600" stroke-width=".9"/>
    <path d="M 87 44 C 91 34 92 27 89 23 C 86 28 84 36 84 46 Z" fill="#ffe066" stroke="#cc6600" stroke-width=".9"/>

    <!-- EYES -->
    <circle cx="73" cy="53" r="5.2" fill="#ffcc00" stroke="#6b1800" stroke-width="1.3"/>
    <circle cx="73" cy="53" r="2.6" fill="#1a0800"/>
    <circle cx="74" cy="52" r="1"   fill="white" opacity="0.8"/>
    <circle cx="87" cy="53" r="5.2" fill="#ffcc00" stroke="#6b1800" stroke-width="1.3"/>
    <circle cx="87" cy="53" r="2.6" fill="#1a0800"/>
    <circle cx="88" cy="52" r="1"   fill="white" opacity="0.8"/>

