<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" role="img" aria-label="Phoenixville Pennsylvania">
  <defs>
    <linearGradient id="flame" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#fff0b3"/>
      <stop offset="22%"  stop-color="#ffd166"/>
      <stop offset="58%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff4d1c"/>
    </linearGradient>
    <linearGradient id="heat" gradientUnits="userSpaceOnUse" x1="138" y1="30" x2="515" y2="108">
      <stop offset="0%"   stop-color="#ff4d1c"/>
      <stop offset="45%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffc24a"/>
    </linearGradient>
  </defs>

  <!-- Phoenix: 100×114 source, scaled to fit 130px logo height -->
  <!-- scale(1.10): 114×1.10=125.4px, translate(5,2) → bottom at 2+125.4=127.4 ✓ -->
  <g transform="translate(5, 2) scale(1.10)">
    <!-- CREST -->
    <path d="M42 18 C40  9 37  4 39  1 C42  6 43 13 42 18Z" fill="#fff0b3"/>
    <path d="M50 15 C50  5 49  0 50 -1 C51  0 50  5 50 15Z" fill="#ffe082"/>
    <path d="M58 18 C60  9 63  4 61  1 C58  6 57 13 58 18Z" fill="#fff0b3"/>
    <!-- HEAD -->
    <ellipse cx="50" cy="26" rx="11" ry="10" fill="#ffd166"/>
    <!-- EYE -->
    <circle cx="55" cy="24" r="2.5" fill="#1a0e00"/>
    <circle cx="56" cy="23" r="1"   fill="#fff8e0" opacity="0.7"/>
    <!-- BEAK -->
    <path d="M59 24 C64 23 68 25 67 29 C65 32 60 31 58 28 C57 26 58 24 59 24Z" fill="#ff8a3d"/>
    <path d="M59 28 C63 28 65 30 63 33 C60 33 58 31 58 28Z" fill="#ff6a2c"/>
    <!-- NECK -->
    <path d="M44 33 C42 39 41 45 40 52 L60 52 C59 45 58 39 56 33Z" fill="#ffb347"/>
    <!-- BODY -->
    <ellipse cx="50" cy="61" rx="13" ry="13" fill="url(#flame)"/>
    <!-- LEFT WING -->
    <path d="M39 50 C28 42 13 31 5 26 C2 24 1 27 3 30 C11 35 23 43 34 54 C36 57 38 61 39 65Z" fill="url(#flame)"/>
    <!-- LEFT primaries -->
    <path d="M 5 26 C  1 23,  0 17,  2 14 C  4 18,  5 23,  7 27Z" fill="#ffd166"/>
    <path d="M 9 21 C  6 17,  5 11,  8  9 C  9 13, 10 19, 12 22Z" fill="#ffe082"/>
    <path d="M14 16 C 12 12, 12  6, 15  4 C 16  8, 16 14, 17 18Z" fill="#fff0b3"/>
    <path d="M20 12 C 18  8, 19  2, 22  1 C 23  5, 22 11, 23 14Z" fill="#fff0b3"/>
    <!-- RIGHT WING -->
    <path d="M61 50 C72 42 87 31 95 26 C98 24 99 27 97 30 C89 35 77 43 66 54 C64 57 62 61 61 65Z" fill="url(#flame)"/>
    <!-- RIGHT primaries -->
    <path d="M95 26 C 99 23, 100 17, 98 14 C 96 18, 95 23, 93 27Z" fill="#ffd166"/>
    <path d="M91 21 C 94 17,  95 11, 92  9 C 91 13, 90 19, 88 22Z" fill="#ffe082"/>
    <path d="M86 16 C 88 12,  88  6, 85  4 C 84  8, 84 14, 83 18Z" fill="#fff0b3"/>
    <path d="M80 12 C 82  8,  81  2, 78  1 C 77  5, 78 11, 77 14Z" fill="#fff0b3"/>
    <!-- TAIL: 7 feathers -->
    <path d="M50 73 C50 83 50 95 50 104 C50 95 50 83 50 73Z"   fill="#ff8a3d"/>
    <path d="M46 74 C42 84 41 97 44 106 C47 97 49 84 50 79Z"   fill="#ff7030"/>
    <path d="M54 74 C58 84 59 97 56 106 C53 97 51 84 50 79Z"   fill="#ff7030"/>
    <path d="M41 76 C36 87 34 100 38 110 C42 100 46 88 50 83Z" fill="#ff5820"/>
    <path d="M59 76 C64 87 66 100 62 110 C58 100 54 88 50 83Z" fill="#ff5820"/>
    <path d="M34 79 C28 91 26 105 31 112 C37 104 42 91 48 86Z" fill="#ff4d1c"/>
    <path d="M66 79 C72 91 74 105 69 112 C63 104 58 91 52 86Z" fill="#ff4d1c"/>
  </g>

  <!-- Divider -->
  <rect x="126" y="14" width="1.5" height="102" rx="1" fill="#ff8a3d" opacity="0.35"/>

  <!-- PHOENIXVILLE -->
  <text x="142" y="80"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="54" font-weight="900" letter-spacing="3"
    fill="url(#heat)">PHOENIXVILLE</text>

  <!-- PENNSYLVANIA -->
  <text x="144" y="106"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13" letter-spacing="8"
    fill="#bdb6ab">PENNSYLVANIA</text>
</svg>
