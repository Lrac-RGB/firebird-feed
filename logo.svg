<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 555 130" role="img" aria-label="Phoenixville Pennsylvania">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="55%">
      <stop offset="0%"   stop-color="#ff8c00"/>
      <stop offset="55%"  stop-color="#d63200"/>
      <stop offset="100%" stop-color="#8c1c00"/>
    </radialGradient>
    <radialGradient id="wgL" cx="22%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#ffcc00"/>
      <stop offset="40%"  stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#cc2800"/>
    </radialGradient>
    <radialGradient id="wgR" cx="78%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#ffcc00"/>
      <stop offset="40%"  stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#cc2800"/>
    </radialGradient>
    <radialGradient id="hg" cx="50%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#ffcc44"/>
      <stop offset="60%"  stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
    <linearGradient id="heat" gradientUnits="userSpaceOnUse" x1="148" y1="30" x2="550" y2="108">
      <stop offset="0%"   stop-color="#cc3200"/>
      <stop offset="45%"  stop-color="#d63200"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- Phoenix: source 160×150, scaled to 130px height via scale(0.853), translate(1,2) -->
