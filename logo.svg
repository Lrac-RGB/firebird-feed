      <stop offset="45%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffc24a"/>
    </linearGradient>
  </defs>

  <!-- Phoenix: source 100×108, scaled 1.13× and shifted to fit 130px-tall logo -->
