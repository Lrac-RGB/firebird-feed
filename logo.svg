  <!-- Divider -->
  <rect x="124" y="14" width="1.5" height="102" rx="1" fill="#ff8a3d" opacity="0.35"/>

  <!-- PHOENIXVILLE -->
  <text x="140" y="80"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="54" font-weight="900" letter-spacing="3"
    fill="url(#heat)">PHOENIXVILLE</text>

  <!-- PENNSYLVANIA -->
  <text x="142" y="106"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13" letter-spacing="8"
    fill="#bdb6ab">PENNSYLVANIA</text>
