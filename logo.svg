    <ellipse cx="73" cy="109" rx="4" ry="3" fill="#cc5500" stroke="#6b1800" stroke-width="1"/>
    <path d="M 73 108 Q 69 118 64 126 Q 61 131 60 136" stroke="#cc5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 73 108 Q 70 120 70 130 Q 70 135 72 138" stroke="#cc5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 73 108 Q 75 120 77 128 Q 78 132 76 136"  stroke="#cc5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <ellipse cx="87" cy="109" rx="4" ry="3" fill="#cc5500" stroke="#6b1800" stroke-width="1"/>
    <path d="M 87 108 Q 91 118 96 126 Q 99 131 100 136" stroke="#cc5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 87 108 Q 90 120 90 130 Q 90 135 88 138" stroke="#cc5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 87 108 Q 85 120 83 128 Q 82 132 84 136"  stroke="#cc5500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Divider -->
  <rect x="142" y="12" width="1.5" height="106" rx="1" fill="#cc5500" opacity="0.5"/>

  <!-- PHOENIXVILLE -->
  <text x="153" y="79"
    font-family="Impact, 'Arial Black', sans-serif"
    font-size="52" font-weight="900" letter-spacing="2"
    fill="url(#heat)">PHOENIXVILLE</text>

  <!-- PENNSYLVANIA -->
  <text x="155" y="105"
    font-family="'Trebuchet MS', Arial, sans-serif"
    font-size="13" letter-spacing="8"
    fill="#bdb6ab">PENNSYLVANIA</text>
</svg>
