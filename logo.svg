    <path d="M 65 78 C 72 74 80 73 95 77" stroke="#8c1c00" stroke-width=".9" fill="none"/>
    <path d="M 64 85 C 71 81 80 80 96 84" stroke="#8c1c00" stroke-width=".9" fill="none"/>
    <path d="M 64 92 C 71 88 80 87 96 91" stroke="#8c1c00" stroke-width=".9" fill="none"/>
    <path d="M 65 99 C 72 95 80 94 95 98" stroke="#8c1c00" stroke-width=".9" fill="none"/>

